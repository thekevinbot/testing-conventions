repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      - id: ruff
        args: [--fix]
        files: ^packages/python/
      - id: ruff-format
        files: ^packages/python/

  - repo: local
    hooks:
      - id: rust-fmt
        name: cargo fmt
        entry: bash -c 'cd packages/rust && cargo fmt --all -- --check'
        language: system
        files: ^packages/rust/.*\.rs$
        pass_filenames: false
      - id: rust-clippy
        name: cargo clippy
        entry: bash -c 'cd packages/rust && cargo clippy --all-targets -- -D warnings'
        language: system
        files: ^packages/rust/.*\.rs$
        pass_filenames: false
