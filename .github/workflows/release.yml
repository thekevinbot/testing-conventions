name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # Preflight gate for first-publish prerequisites. Fails fast with an
  # actionable error before the reusable workflow runs, so a misconfigured
  # release does not produce confusing 404s deep in the publish step.
  preflight:
    runs-on: ubuntu-latest
    steps:
      - name: Repo visibility check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          private=$(gh api "repos/${GITHUB_REPOSITORY}" --jq .private)
          if [ "$private" = "true" ]; then
            echo "::error::Repository is private. Trusted Publishing on npm / PyPI / crates.io requires a public repository so the provider can inspect the workflow file at the configured ref. Make the repo public (Settings -> General -> Danger Zone -> Change visibility) before releasing, or remove this preflight step if you have an alternative publish path."
            exit 1
          fi
          echo "Repo is public; OK to proceed."

  release:
    needs: preflight
    uses: thekevinscott/putitoutthere/.github/workflows/release.yml@v0
    permissions:
      contents: write
      id-token: write
    secrets:
      # First publish of a brand-new crate has no Trusted Publishing path
      # on crates.io (TP binds to an already-published crate). Forward a
      # long-lived API token; the reusable workflow skips the OIDC
      # exchange when this secret is set. Once 0.0.1 is on crates.io,
      # register a Trusted Publisher and unset this.
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      # Same story for npm: Trusted Publishing binds to an
      # already-published package, so the first publish needs a
      # long-lived automation token. The reusable workflow exports this
      # as NODE_AUTH_TOKEN for the npm CLI when set, and skips the OIDC
      # exchange. Without it, scoped-package PUTs return 404 (npm uses
      # 404 instead of 401 for unauthenticated writes). Drop once
      # Trusted Publishers are registered on all npm package names.
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

  # PyPI upload runs in the caller's workflow context. Required because
  # PyPI Trusted Publishers can't validate OIDC tokens minted from a
  # cross-repo reusable workflow (pypi/warehouse#11096). The `if:` gate
  # skips this job for non-PyPI repos.
  pypi-publish:
    needs: release
    if: needs.release.outputs.has_pypi == 'true'
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: '*-sdist'
          path: dist/
          merge-multiple: true
      - uses: actions/download-artifact@v8
        with:
          pattern: '*-wheel-*'
          path: dist/
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
